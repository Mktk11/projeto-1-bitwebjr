<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BitWeb - Projeto 1</title>
    <!-- Ícones -->

    <script src="https://kit.fontawesome.com/9729da2774.js" crossorigin="anonymous"></script>

    <!-- Estilos -->

    <link rel="stylesheet" href="css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <!-- Javascript -->

    <script src="js/scripts.js" defer></script>

  </head>
  <body class="tema--light">
    <nav>
      <div class="nav__container">
        <a href="#">
          <img src="imagens/logo.png"  onclick="temaLightDark()" alt="BitwebJr">
        </a>
        <ul>
          <li>
            <input type="checkbox" name="change-theme" id="change-theme">
            <label for="change-theme">
              <i class="fa-solid fa-toggle-off" onclick="temaLightDark()"></i>
              <i class="fa-solid fa-toggle-on" onclick="temaLightDark()"></i>
            </label>
          </li>
        </ul>
      </div>
    </nav>
    <main>
      <section id="main_section--img">
        <img src="imagens/logo-bit-removebg.png">
      </section>
      <section id="main_section--login">
        <div id="section__div--logincadastro">
          <button onclick="botaoAtivado('login')">Login</button>
          <button onclick="botaoAtivado('cadastro')">Cadastro</button>
        </div>
        <div id="form--cadastro">
          <form action="cadastro.php" method="POST" enctype="multipart/form-data">
            <div class="form--div">
              <label>Nome</label>
              <input type="text" name="user">
            </div>
            <div class="form--div">
              <label>Senha</label>
              <input type="password" name="senha">
            </div>
            <div class="form--div">
              <label>Email</label>
              <input type="text" name="email">
            </div>
            <div class="form--div">
              <label>Foto de perfil</label>
              <input type="file" name="image-upload" accept="image/*">
            </div>
            <div class="form--div">
              <input type="submit" name="">
            </div>
          </form>
        </div>
        <div id="form--login">
          <form action="login.php" method="POST" enctype="multipart/form-data">
            <div class="form--div">
              <label>Usuário</label>
              <input type="email" name="email">
            </div>
            <div class="form--div">
              <label>Senha</label>
              <input type="password" name="senha">
            </div>
            <div class="form--div">
              <input type="submit" name="">
            </div>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
