<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BitWeb - Projeto 1</title>
    <!-- Ícones -->

     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" 
     integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" 
     crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Estilos -->

    <link rel="stylesheet" href="css/estilo.css">

    <!-- Javascript -->

    <script src="js/scripts.js" defer></script>

  </head>
  <body>
    <main id="layout">
      <a href="#">
        <img src="imagens/logo.png" alt="BitWeb - Server">
      </a>
      <div id="login">
          <h1>Login</h1>
          <form id="form">
              <div id="formulario-login">
                  <label for="user">usuário<br></label>
                  <input type="text" name="user" id="user"/>
                  <i onclick="aparecer()" class="fa-solid fa-ellipsis-vertical"></i>
                  <ul id="visivel" style="display: none;"><li>Cadastrar usuário</li></ul>
                  <label for="password">senha<br></label>
                  <input type="password" name="password" id="password"/>
                  <i class="fas fa-eye" id="olho"></i>
                  <span id="erroLogin" style="color: red; display: none;"></span><br>
                  <input type="submit" id="botão-entrar" value="ENTRAR">
              </div>
          </form>
      </div>
    </main>
  </body>
</html>
