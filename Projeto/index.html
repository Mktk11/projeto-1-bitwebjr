<html lang="pt-br">
  <head>

    <div class="layout">
        <img src="imagens/logo.png" alt="BitWeb - Server">
        <div id="login">
            <h1>Login</h1>
            <form action="" method="">
                <div class="formulario-login">
                    <label for="user">usuário<br></label>

                    <label for="password">senha<br></label>
                    <input type="password" name="password" id="Senha"/>
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                </div>
                <div id="botão">
                    <button> <a href="home.html" target="_blank"><strong>Entrar</strong></a></button>
                </div>
            </form>
        </div>
    </div>
